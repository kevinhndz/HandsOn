<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Cinemas Valladolid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}">
<style>
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
  }
  .login-box {
    background: var(--maroon);
    border: 1px solid rgba(212,175,55,0.2);
    border-radius: 12px;
    padding: 2.5rem;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .login-box h2 {
    font-size: 2rem;
    color: var(--gold-light);
    margin-bottom: 0.5rem;
  }
  .login-box p {
    color: var(--muted);
    font-size: 0.88rem;
    margin-bottom: 1.5rem;
  }
  .error-msg {
    color: var(--danger);
    font-size: 0.85rem;
    margin-bottom: 1rem;
  }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <h2>ADMIN</h2>
    <p>Cinemas Valladolid — Panel de reservas</p>
    {% if error %}
      <p class="error-msg">{{ error }}</p>
    {% endif %}
    <form method="POST" action="/admin/reservas">
      <input class="field" type="password" name="password" placeholder="contraseña de acceso">
      <button class="full-btn btn-gold" type="submit" style="margin-top:0.5rem">Entrar</button>
    </form>
  </div>
</div>
</body>
</html>
